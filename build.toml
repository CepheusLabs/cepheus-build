[github]
default_workflow = "shared-build.yml"

[github.runner_profiles.github-hosted]
label = "GitHub-provided"
planner = "ubuntu-latest"
linux = "ubuntu-latest"
macos = "macos-latest"
windows = "windows-latest"

[github.runner_profiles.self-hosted]
label = "Org self-hosted"
planner = ["self-hosted", "linux"]
linux = ["self-hosted", "linux"]
macos = ["self-hosted", "macos"]
windows = ["self-hosted", "windows"]

[tools.appimagetool]
hint = "install appimagetool from the AppImageKit releases"

[tools.cargo]
hint = "install Rust with rustup or your package manager"

# ── Linux native-package tooling ────────────────────────────────────────────
# Used by the desktop_packages targets (linux-deb / linux-rpm / linux-flatpak).
# dpkg-deb ships with dpkg (preinstalled on Debian/Ubuntu, incl. ubuntu-latest);
# rpmbuild and flatpak are not, so CI installs them when a matrix row needs them.
[tools.dpkg-deb]
hint = "install dpkg (preinstalled on Debian/Ubuntu); on Fedora: dnf install dpkg"
check = { linux = ["command -v dpkg-deb >/dev/null 2>&1"] }
install = { linux = ["sudo apt-get update && sudo apt-get install -y dpkg-dev"] }

[tools.rpmbuild]
hint = "install rpm build tools: apt-get install rpm (Debian/Ubuntu) or dnf install rpm-build (Fedora)"
check = { linux = ["command -v rpmbuild >/dev/null 2>&1"] }
install = { linux = ["sudo apt-get update && sudo apt-get install -y rpm"] }

[tools.flatpak]
hint = "install flatpak from your package manager (apt-get install flatpak)"
check = { linux = ["command -v flatpak >/dev/null 2>&1"] }
install = { linux = ["sudo apt-get update && sudo apt-get install -y flatpak"] }

[tools.flatpak-builder]
hint = "install flatpak-builder (apt-get install flatpak-builder)"
check = { linux = ["command -v flatpak-builder >/dev/null 2>&1"] }
install = { linux = ["sudo apt-get update && sudo apt-get install -y flatpak-builder"] }

# GPG signs Linux package-repo metadata (apt Release, rpm headers, flatpak
# OSTree commits). Signing is env-gated in the helper scripts; the tool only
# needs to be present when GPG_SIGNING_KEY is set.
[tools.gpg]
hint = "install GnuPG (apt-get install gnupg / brew install gnupg)"
check = { linux = ["command -v gpg >/dev/null 2>&1"], macos = ["command -v gpg >/dev/null 2>&1"] }
install = { linux = ["sudo apt-get update && sudo apt-get install -y gnupg"], macos = ["brew install gnupg"] }

[tools.cargo-ndk]
hint = "install with: cargo install cargo-ndk --locked"
install = ["cargo install cargo-ndk --locked"]

[tools."clang++"]
hint = "install LLVM/Clang and make sure clang++ is on PATH"

[tools.cmake]
hint = "install CMake and make sure cmake is on PATH"

[tools.create-dmg]
hint = "install with: brew install create-dmg"
install = { macos = ["brew install create-dmg"] }

[tools.docker]
hint = "install Docker CLI plus a Docker-compatible engine and make sure docker is on PATH"
install = { macos = ["brew install --cask docker"], windows = ["winget install -e --id Docker.DockerDesktop"] }

[tools.docker-daemon]
hint = "start Docker Desktop, Docker Engine, Colima, OrbStack, or another Docker-compatible daemon; the Docker CLI alone is not enough"
check = { linux = ["docker info >/dev/null 2>&1"], macos = ["docker info >/dev/null 2>&1"], windows = ["docker info >NUL 2>&1"] }
install = { macos = ["open -a Docker || true; for i in $(seq 1 60); do docker info >/dev/null 2>&1 && exit 0; sleep 2; done; docker info"] }

[tools.flutter]
hint = "install Flutter and make sure flutter is on PATH"

[tools.flutter_rust_bridge_codegen]
hint = "install with: cargo install flutter_rust_bridge_codegen --locked"
install = ["cargo install flutter_rust_bridge_codegen --locked"]

[tools.go]
hint = "install Go from go.dev or your package manager"

[tools.iscc]
hint = "install Inno Setup and make sure iscc is on PATH"

[tools.ninja]
hint = "install Ninja and make sure ninja is on PATH"

[tools.pwsh]
hint = "install PowerShell and make sure pwsh is on PATH"
install = { macos = ["brew install powershell"] }

[tools.powershell]
hint = "PowerShell is built into Windows; otherwise install PowerShell and make sure powershell is on PATH"

[tools.pod]
hint = "install CocoaPods with: brew install cocoapods"
install = { macos = ["brew install cocoapods"] }

# python3 + pynacl back the auto-update key tooling (scripts/cl-update-keygen.sh,
# sign-update-eddsa.sh, verify-update-eddsa.sh, publish-update-feed.sh). pynacl
# is a pip dependency, not a CLI, so the scripts check `python3 -c "import nacl"`
# and hint to `python3 -m pip install pynacl` rather than there being a tool
# entry for it. The check below confirms python3 is present AND pynacl imports.
[tools.python3]
hint = "install Python 3 and `python3 -m pip install pynacl` (auto-update EdDSA key tooling)"
check = { default = ["command -v python3 >/dev/null 2>&1 && python3 -c 'import nacl' >/dev/null 2>&1"], windows = ["python -c \"import nacl\""] }
install = { macos = ["brew install python && python3 -m pip install pynacl"], linux = ["python3 -m pip install pynacl"] }

[tools.rustup]
hint = "install Rust with rustup"

[tools.wasm-pack]
hint = "install with: cargo install wasm-pack --locked"
install = ["cargo install wasm-pack --locked"]
