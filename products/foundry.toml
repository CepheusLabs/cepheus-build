[product]
slug = "foundry"
display_name = "Foundry"
repo_root = "../../foundry"
app_dir = "."

[version]
env_prefix = "FOUNDRY"

[github]
repository = "CepheusLabs/foundry"

[groups]
quality = ["fmt", "clippy", "test"]
host = ["host-linux", "host-macos", "host-windows"]
cli = ["cli-linux", "cli-macos", "cli-windows"]
mcu = ["mcu-rp2040", "mcu-manta-m8p-h723"]
os = ["deckhand-stage"]
release = ["cli-linux", "cli-macos", "cli-windows", "mcu-rp2040", "mcu-manta-m8p-h723", "deckhand-stage", "os-update-bundle"]
all = ["fmt", "clippy", "test", "cli-linux", "cli-macos", "cli-windows", "mcu-rp2040", "mcu-manta-m8p-h723", "deckhand-stage"]
desktop = ["cli-linux", "cli-macos", "cli-windows"]

[targets.fmt]
hosts = ["linux", "macos", "windows"]
cwd = "."
commands = [
  "cargo fmt --all -- --check",
]
tools = ["cargo"]

[targets.clippy]
hosts = ["linux", "macos", "windows"]
cwd = "."
commands = [
  "cargo clippy --all-targets --all-features -- -D warnings",
]
tools = ["cargo"]

[targets.test]
hosts = ["linux", "macos", "windows"]
cwd = "."
commands = [
  "cargo test --workspace --all-features",
]
tools = ["cargo"]

[targets.host-linux]
hosts = ["linux"]
cwd = "."
commands = [
  "cargo build --release --workspace",
]
artifacts = [
  "target/release/foundry",
  "target/release/foundryd",
]
tools = ["cargo"]

[targets.host-macos]
hosts = ["macos"]
cwd = "."
commands = [
  "cargo build --release --workspace",
]
artifacts = [
  "target/release/foundry",
  "target/release/foundryd",
]
tools = ["cargo"]

[targets.host-windows]
hosts = ["windows"]
cwd = "."
commands = [
  "cargo build --release --workspace",
]
artifacts = [
  "target/release/foundry.exe",
  "target/release/foundryd.exe",
]
tools = ["cargo"]

[targets.cli-linux]
hosts = ["linux"]
cwd = "."
commands = [
  "rustup target add x86_64-unknown-linux-gnu",
  "cargo build --release --target x86_64-unknown-linux-gnu --bin foundry",
]
artifacts = ["target/x86_64-unknown-linux-gnu/release/foundry"]
tools = ["cargo", "rustup"]

[targets.cli-macos]
hosts = ["macos"]
cwd = "."
commands = [
  "rustup target add aarch64-apple-darwin",
  "cargo build --release --target aarch64-apple-darwin --bin foundry",
]
artifacts = ["target/aarch64-apple-darwin/release/foundry"]
tools = ["cargo", "rustup"]

[targets.cli-windows]
hosts = ["windows"]
cwd = "."
commands = [
  "rustup target add x86_64-pc-windows-msvc",
  "cargo build --release --target x86_64-pc-windows-msvc --bin foundry",
]
artifacts = ["target/x86_64-pc-windows-msvc/release/foundry.exe"]
tools = ["cargo", "rustup"]

[targets.mcu-rp2040]
hosts = ["linux", "macos", "windows"]
cwd = "."
commands = [
  "rustup target add thumbv6m-none-eabi",
  "cargo xtask build-mcu rp2040",
]
artifacts = [
  "target/foundry-mcu/rp2040/foundry-mcu-rp2040.elf",
  "target/foundry-mcu/rp2040/foundry-mcu-rp2040.elf.sha256",
  "target/foundry-mcu/rp2040/foundry-mcu-rp2040.json",
]
tools = ["cargo", "rustup"]

[targets.mcu-manta-m8p-h723]
hosts = ["linux", "macos", "windows"]
cwd = "."
commands = [
  "rustup target add thumbv7em-none-eabihf",
  "cargo xtask build-mcu manta-m8p-h723",
]
artifacts = [
  "target/foundry-mcu/manta-m8p-h723/foundry-mcu-manta-m8p-h723.elf",
  "target/foundry-mcu/manta-m8p-h723/foundry-mcu-manta-m8p-h723.elf.sha256",
  "target/foundry-mcu/manta-m8p-h723/foundry-mcu-manta-m8p-h723.json",
]
tools = ["cargo", "rustup"]

[targets.os-configure]
hosts = ["linux", "macos", "windows"]
cwd = "."
env = { linux = { DOCKER_CONFIG = "$CBUILD_REPO_ROOT/target/cepheus-build/docker-public" }, macos = { DOCKER_CONFIG = "$CBUILD_REPO_ROOT/target/cepheus-build/docker-public" } }
pre = { linux = ['mkdir -p "$DOCKER_CONFIG" && printf "{\"auths\":{}}\n" > "$DOCKER_CONFIG/config.json"', "chmod +x scripts/build-os.sh scripts/build-setup-ui.sh"], macos = ['mkdir -p "$DOCKER_CONFIG" && printf "{\"auths\":{}}\n" > "$DOCKER_CONFIG/config.json"', "chmod +x scripts/build-os.sh scripts/build-setup-ui.sh"] }
commands = { linux = ["scripts/build-os.sh manta-m8p-cm4 --action configure"], macos = ["scripts/build-os.sh manta-m8p-cm4 --action configure"], windows = ["powershell -ExecutionPolicy Bypass -File scripts/build-os.ps1 manta-m8p-cm4 -Action configure"] }
artifacts = ["target/foundry-os/manta-m8p-cm4/.config"]
tools = { linux = ["bash", "docker", "docker-daemon"], macos = ["bash", "docker", "docker-daemon"], windows = ["powershell", "docker", "docker-daemon"] }

[targets.os-image]
hosts = ["linux", "macos", "windows"]
cwd = "."
env = { linux = { DOCKER_CONFIG = "$CBUILD_REPO_ROOT/target/cepheus-build/docker-public" }, macos = { DOCKER_CONFIG = "$CBUILD_REPO_ROOT/target/cepheus-build/docker-public" } }
pre = { linux = ['mkdir -p "$DOCKER_CONFIG" && printf "{\"auths\":{}}\n" > "$DOCKER_CONFIG/config.json"', "chmod +x scripts/build-os.sh scripts/build-setup-ui.sh"], macos = ['mkdir -p "$DOCKER_CONFIG" && printf "{\"auths\":{}}\n" > "$DOCKER_CONFIG/config.json"', "chmod +x scripts/build-os.sh scripts/build-setup-ui.sh"] }
commands = { linux = ["scripts/build-os.sh manta-m8p-cm4 --action build"], macos = ["scripts/build-os.sh manta-m8p-cm4 --action build"], windows = ["powershell -ExecutionPolicy Bypass -File scripts/build-os.ps1 manta-m8p-cm4 -Action build"] }
artifacts = [
  "target/foundry-os/manta-m8p-cm4/images",
  "target/foundry-os/manta-m8p-cm4/images/foundry-image-manifest.json",
  "target/foundry-os/manta-m8p-cm4/images/deckhand-image-manifest.json",
  "target/foundry-os/manta-m8p-cm4/images/artifact-index.json",
]
tools = { linux = ["bash", "docker", "docker-daemon"], macos = ["bash", "docker", "docker-daemon"], windows = ["powershell", "docker", "docker-daemon"] }

[targets.os-validate]
hosts = ["linux", "macos", "windows"]
cwd = "."
env = { linux = { DOCKER_CONFIG = "$CBUILD_REPO_ROOT/target/cepheus-build/docker-public" }, macos = { DOCKER_CONFIG = "$CBUILD_REPO_ROOT/target/cepheus-build/docker-public" } }
pre = { linux = ['mkdir -p "$DOCKER_CONFIG" && printf "{\"auths\":{}}\n" > "$DOCKER_CONFIG/config.json"', "chmod +x scripts/build-os.sh scripts/build-setup-ui.sh"], macos = ['mkdir -p "$DOCKER_CONFIG" && printf "{\"auths\":{}}\n" > "$DOCKER_CONFIG/config.json"', "chmod +x scripts/build-os.sh scripts/build-setup-ui.sh"] }
commands = { linux = ["scripts/build-os.sh manta-m8p-cm4 --action validate"], macos = ["scripts/build-os.sh manta-m8p-cm4 --action validate"], windows = ["powershell -ExecutionPolicy Bypass -File scripts/build-os.ps1 manta-m8p-cm4 -Action validate"] }
tools = { linux = ["bash", "docker", "docker-daemon"], macos = ["bash", "docker", "docker-daemon"], windows = ["powershell", "docker", "docker-daemon"] }

[targets.os-smoke]
hosts = ["linux", "macos", "windows"]
cwd = "."
env = { linux = { DOCKER_CONFIG = "$CBUILD_REPO_ROOT/target/cepheus-build/docker-public" }, macos = { DOCKER_CONFIG = "$CBUILD_REPO_ROOT/target/cepheus-build/docker-public" } }
pre = { linux = ['mkdir -p "$DOCKER_CONFIG" && printf "{\"auths\":{}}\n" > "$DOCKER_CONFIG/config.json"', "chmod +x scripts/build-os.sh scripts/build-setup-ui.sh"], macos = ['mkdir -p "$DOCKER_CONFIG" && printf "{\"auths\":{}}\n" > "$DOCKER_CONFIG/config.json"', "chmod +x scripts/build-os.sh scripts/build-setup-ui.sh"] }
commands = { linux = ["scripts/build-os.sh manta-m8p-cm4 --action smoke"], macos = ["scripts/build-os.sh manta-m8p-cm4 --action smoke"], windows = ["powershell -ExecutionPolicy Bypass -File scripts/build-os.ps1 manta-m8p-cm4 -Action smoke"] }
tools = { linux = ["bash", "docker", "docker-daemon"], macos = ["bash", "docker", "docker-daemon"], windows = ["powershell", "docker", "docker-daemon"] }

[targets.os-qemu-smoke]
hosts = ["linux", "macos", "windows"]
cwd = "."
env = { linux = { DOCKER_CONFIG = "$CBUILD_REPO_ROOT/target/cepheus-build/docker-public" }, macos = { DOCKER_CONFIG = "$CBUILD_REPO_ROOT/target/cepheus-build/docker-public" } }
pre = { linux = ['mkdir -p "$DOCKER_CONFIG" && printf "{\"auths\":{}}\n" > "$DOCKER_CONFIG/config.json"', "chmod +x scripts/build-os.sh scripts/build-setup-ui.sh"], macos = ['mkdir -p "$DOCKER_CONFIG" && printf "{\"auths\":{}}\n" > "$DOCKER_CONFIG/config.json"', "chmod +x scripts/build-os.sh scripts/build-setup-ui.sh"] }
commands = { linux = ["scripts/build-os.sh manta-m8p-cm4 --action qemu-smoke"], macos = ["scripts/build-os.sh manta-m8p-cm4 --action qemu-smoke"], windows = ["powershell -ExecutionPolicy Bypass -File scripts/build-os.ps1 manta-m8p-cm4 -Action qemu-smoke"] }
tools = { linux = ["bash", "docker", "docker-daemon"], macos = ["bash", "docker", "docker-daemon"], windows = ["powershell", "docker", "docker-daemon"] }

[targets.os-package]
hosts = ["linux", "macos", "windows"]
cwd = "."
env = { linux = { DOCKER_CONFIG = "$CBUILD_REPO_ROOT/target/cepheus-build/docker-public" }, macos = { DOCKER_CONFIG = "$CBUILD_REPO_ROOT/target/cepheus-build/docker-public" } }
pre = { linux = ['mkdir -p "$DOCKER_CONFIG" && printf "{\"auths\":{}}\n" > "$DOCKER_CONFIG/config.json"', "chmod +x scripts/build-os.sh scripts/build-setup-ui.sh"], macos = ['mkdir -p "$DOCKER_CONFIG" && printf "{\"auths\":{}}\n" > "$DOCKER_CONFIG/config.json"', "chmod +x scripts/build-os.sh scripts/build-setup-ui.sh"] }
commands = { linux = ["scripts/build-os.sh manta-m8p-cm4 --action package"], macos = ["scripts/build-os.sh manta-m8p-cm4 --action package"], windows = ["powershell -ExecutionPolicy Bypass -File scripts/build-os.ps1 manta-m8p-cm4 -Action package"] }
artifacts = [
  "target/foundry-os/manta-m8p-cm4/package/foundry-os-manta-m8p-cm4.tar.gz",
  "target/foundry-os/manta-m8p-cm4/package/foundry-os-manta-m8p-cm4.tar.gz.sha256",
]
tools = { linux = ["bash", "docker", "docker-daemon"], macos = ["bash", "docker", "docker-daemon"], windows = ["powershell", "docker", "docker-daemon"] }

[targets.deckhand-stage]
hosts = ["linux", "macos", "windows"]
cwd = "."
env = { linux = { DOCKER_CONFIG = "$CBUILD_REPO_ROOT/target/cepheus-build/docker-public" }, macos = { DOCKER_CONFIG = "$CBUILD_REPO_ROOT/target/cepheus-build/docker-public" } }
pre = { linux = ['mkdir -p "$DOCKER_CONFIG" && printf "{\"auths\":{}}\n" > "$DOCKER_CONFIG/config.json"', "chmod +x scripts/build-os.sh scripts/build-setup-ui.sh"], macos = ['mkdir -p "$DOCKER_CONFIG" && printf "{\"auths\":{}}\n" > "$DOCKER_CONFIG/config.json"', "chmod +x scripts/build-os.sh scripts/build-setup-ui.sh"] }
commands = { linux = ["scripts/build-os.sh manta-m8p-cm4 --action stage"], macos = ["scripts/build-os.sh manta-m8p-cm4 --action stage"], windows = ["powershell -ExecutionPolicy Bypass -File scripts/build-os.ps1 manta-m8p-cm4 -Action stage"] }
artifacts = ["target/foundry-os/manta-m8p-cm4/deckhand-stage"]
tools = { linux = ["bash", "docker", "docker-daemon"], macos = ["bash", "docker", "docker-daemon"], windows = ["powershell", "docker", "docker-daemon"] }

[targets.deckhand-stage-existing]
hosts = ["linux"]
cwd = "."
commands = [
  "rustup target add thumbv7em-none-eabihf",
  "cargo xtask stage-os manta-m8p-cm4 --skip-build",
]
artifacts = ["target/foundry-os/manta-m8p-cm4/deckhand-stage"]
tools = ["cargo", "rustup", "tar"]

[targets.os-update-bundle]
hosts = ["linux"]
cwd = "."
commands = [
  "bash os/release/signing/generate-dev-ca.sh",
  'cargo xtask package-update manta-m8p-cm4 --version "$CBUILD_VERSION" --channel "${FOUNDRY_CHANNEL:-developer}"',
]
artifacts = [
  "target/foundry-os/manta-m8p-cm4/update-bundle/*.raucb",
  "target/foundry-os/manta-m8p-cm4/update-bundle/*.sha256",
  "target/foundry-os/manta-m8p-cm4/update-bundle/foundry-update-bundle-manifest.json",
]
tools = ["bash", "cargo", "openssl", "rauc"]

[targets.opi-conformance]
hosts = ["linux", "macos"]
cwd = "."
commands = [
  'test -n "$FOUNDRY_OPI_BASE_URL"',
  'cargo xtask opi-conformance --base-url "$FOUNDRY_OPI_BASE_URL"',
]
tools = ["cargo"]

[stores.github_release]
enabled = true
hosts = ["linux"]
cwd = "."
required_env = ["GITHUB_TOKEN"]
commands = [
  'bash "$CBUILD_TOOL_ROOT/scripts/upload-release.sh" "v$CBUILD_VERSION-$CBUILD_BUILD_NUMBER" "target/x86_64-unknown-linux-gnu/release/foundry" "target/aarch64-apple-darwin/release/foundry" "target/x86_64-pc-windows-msvc/release/foundry.exe" "target/foundry-mcu/*/*" "target/foundry-os/manta-m8p-cm4/package/*" "target/foundry-os/manta-m8p-cm4/update-bundle/*"',
]
