[product]
slug = "anvil"
display_name = "Anvil"
repo_root = "../../anvil"
app_dir = "app"

[version]
env_prefix = "ANVIL"

[github]
repository = "CepheusLabs/anvil"

[groups]
quality = ["fmt", "lint", "test"]
desktop = ["macos", "windows", "linux"]
# Distributable installers (signed where creds exist). Build with:
#   cepheus-build build -p anvil desktop_packages
desktop_packages = ["macos-dmg", "windows-installer", "linux-deb", "linux-rpm", "linux-flatpak"]
mobile = ["ios", "android"]
all = ["web", "android", "ios", "macos", "windows", "linux"]

[targets.fmt]
hosts = ["linux", "macos", "windows"]
cwd = "."
commands = { default = ["bash scripts/quality.sh fmt"], windows = ["pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/quality.ps1 fmt"] }
tools = { default = ["bash", "cargo"], windows = ["pwsh", "cargo"] }

[targets.lint]
hosts = ["linux", "macos", "windows"]
cwd = "."
commands = { default = ["bash scripts/quality.sh lint"], windows = ["pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/quality.ps1 lint"] }
tools = { default = ["bash", "cargo", "flutter", "flutter_rust_bridge_codegen"], windows = ["pwsh", "bash", "cargo", "flutter", "flutter_rust_bridge_codegen"] }

[targets.test]
hosts = ["linux", "macos", "windows"]
cwd = "."
commands = { default = ["bash scripts/quality.sh test"], windows = ["pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/quality.ps1 test"] }
tools = { default = ["bash", "cargo", "flutter", "go"], windows = ["pwsh", "cargo", "flutter", "go"] }

[targets.web]
enabled = false
hosts = ["linux", "macos", "windows"]
cwd = "."
commands = [
  "pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/build-web.ps1",
]
artifacts = ["app/build/web"]
tools = ["pwsh", "flutter", "flutter_rust_bridge_codegen", "wasm-pack", "rustup", "clang++"]

[targets.android]
hosts = ["linux", "macos"]
cwd = "."
commands = [
  "rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android",
  "cd core/pd-ffi && cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 -o \"$CBUILD_APP_DIR/android/app/src/main/jniLibs\" build --release",
  "cd \"$CBUILD_APP_DIR\" && flutter pub get",
  "cd \"$CBUILD_APP_DIR\" && flutter build apk --release --build-name=\"$CBUILD_VERSION\" --build-number=\"$CBUILD_BUILD_NUMBER\"",
  "cd \"$CBUILD_APP_DIR\" && flutter build appbundle --release --build-name=\"$CBUILD_VERSION\" --build-number=\"$CBUILD_BUILD_NUMBER\"",
]
artifacts = [
  "app/build/app/outputs/flutter-apk/app-release.apk",
  "app/build/app/outputs/bundle/release/app-release.aab",
]
tools = ["cargo", "cargo-ndk", "flutter", "rustup"]

[targets.ios]
hosts = ["macos"]
cwd = "."
commands = [
  "rustup target add aarch64-apple-ios aarch64-apple-ios-sim",
  "cd core/pd-ffi && cargo build --release --target aarch64-apple-ios",
  "cd core/pd-ffi && cargo build --release --target aarch64-apple-ios-sim",
  "cd \"$CBUILD_APP_DIR\" && flutter pub get",
  "cd \"$CBUILD_APP_DIR\" && flutter build ipa --release --build-name=\"$CBUILD_VERSION\" --build-number=\"$CBUILD_BUILD_NUMBER\"",
]
artifacts = ["app/build/ios/ipa/*.ipa"]
tools = ["cargo", "flutter", "xcodebuild", "pod"]

[targets.macos]
hosts = ["macos"]
cwd = "."
commands = [
  "cargo build --release --workspace",
  "cd \"$CBUILD_APP_DIR\" && flutter pub get",
  "cd \"$CBUILD_APP_DIR\" && flutter build macos --release --build-name=\"$CBUILD_VERSION\" --build-number=\"$CBUILD_BUILD_NUMBER\"",
]
artifacts = ["app/build/macos/Build/Products/Release/Anvil.app"]
tools = ["cargo", "flutter", "xcodebuild", "pod"]

[targets.windows]
hosts = ["windows"]
cwd = "."
commands = [
  "pwsh -NoProfile -ExecutionPolicy Bypass -Command \"& { cargo build --release --workspace; Set-Location $env:CBUILD_APP_DIR; flutter pub get; flutter build windows --release --build-name=$env:CBUILD_VERSION --build-number=$env:CBUILD_BUILD_NUMBER }\"",
]
artifacts = ["app/build/windows/x64/runner/Release"]
tools = ["pwsh", "cargo", "flutter"]

[targets.linux]
hosts = ["linux"]
cwd = "."
commands = [
  "cargo build --release --workspace",
  "cd \"$CBUILD_APP_DIR\" && flutter pub get",
  "cd \"$CBUILD_APP_DIR\" && flutter build linux --release --build-name=\"$CBUILD_VERSION\" --build-number=\"$CBUILD_BUILD_NUMBER\"",
]
artifacts = ["app/build/linux/x64/release/bundle"]
tools = ["cargo", "flutter"]

# ── Distributable installer targets (desktop_packages group) ────────────────
# Each builds the app, then wraps it in an OS-native installer. Signing is
# env-gated inside the packaging scripts (unsigned passthrough until creds
# exist). Packaging recipes live in the product repo under packaging/<os>/.

[targets.macos-dmg]
hosts = ["macos"]
cwd = "."
# The existing dev-id script builds the .app, signs (Developer ID + hardened
# runtime), wraps it in a DMG and notarizes when a notary profile is present.
# CBUILD_* are mapped to the script's own env names.
commands = [
  "ANVIL_VERSION=\"$CBUILD_VERSION\" ANVIL_BUILD_NUMBER=\"$CBUILD_BUILD_NUMBER\" bash scripts/package-macos-developerid.sh",
]
artifacts = ["dist/macos/Anvil-*.dmg"]
tools = ["cargo", "flutter", "xcodebuild", "pod", "codesign"]

[targets.windows-installer]
hosts = ["windows"]
cwd = "."
commands = [
  "pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/build-windows.ps1",
  "pwsh -NoProfile -ExecutionPolicy Bypass -File packaging/windows/build_installer.ps1 -Version \"$env:CBUILD_VERSION\"",
]
artifacts = ["packaging/windows/dist/*.exe"]
tools = ["pwsh", "cargo", "flutter", "iscc"]

[targets.linux-deb]
hosts = ["linux"]
cwd = "."
commands = [
  "bash scripts/build-linux.sh",
  "bash packaging/linux/build_deb.sh \"$CBUILD_VERSION\"",
]
artifacts = ["packaging/linux/dist/*.deb"]
tools = ["cargo", "flutter", "dpkg-deb"]

[targets.linux-rpm]
hosts = ["linux"]
cwd = "."
commands = [
  "bash scripts/build-linux.sh",
  "bash packaging/linux/build_rpm.sh \"$CBUILD_VERSION\"",
]
artifacts = ["packaging/linux/dist/*.rpm"]
tools = ["cargo", "flutter", "rpmbuild"]

[targets.linux-flatpak]
hosts = ["linux"]
cwd = "."
commands = [
  "bash scripts/build-linux.sh",
  "bash packaging/linux/build_flatpak.sh \"$CBUILD_VERSION\"",
]
artifacts = ["packaging/linux/dist/*.flatpak"]
tools = ["cargo", "flutter", "flatpak", "flatpak-builder"]

[stores.testflight_ios]
enabled = false
cwd = "."
required_env = ["APPSTORE_CONNECT_KEY_ID", "APPSTORE_CONNECT_ISSUER_ID"]
commands = [
  "xcrun altool --upload-app --file app/build/ios/ipa/*.ipa --type ios --apiKey \"$APPSTORE_CONNECT_KEY_ID\" --apiIssuer \"$APPSTORE_CONNECT_ISSUER_ID\"",
]

[stores.google_play]
enabled = false
cwd = "."
required_env = ["GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"]
commands = [
  "python3 -m cepheus_build.deploy.google_play --aab app/build/app/outputs/bundle/release/app-release.aab --package com.cepheuslabs.anvil --track \"${PLAY_TRACK:-internal}\" --service-account \"$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON\"",
]

# ── Direct-download release: upload installers to a GitHub Release ───────────
# The release/tag itself is created by the product's release workflow; this
# lane uploads the built installers to it. Run after desktop_packages.
[stores.github_release]
enabled = true
cwd = "."
required_env = ["GITHUB_TOKEN"]
# Globs are quoted so upload-release.sh expands them with nullglob: cross-host
# artifacts absent on a single-host run are skipped, and staging subdirs under
# packaging/linux/dist are filtered out (only real files upload).
commands = [
  "bash \"$CBUILD_TOOL_ROOT/scripts/upload-release.sh\" \"v$CBUILD_VERSION-$CBUILD_BUILD_NUMBER\" \"dist/macos/Anvil-*.dmg\" \"packaging/windows/dist/*.exe\" \"packaging/linux/dist/*.deb\" \"packaging/linux/dist/*.rpm\" \"packaging/linux/dist/*.flatpak\"",
]

# ── Self-hosted package repositories (apt / yum / flatpak) ──────────────────
# enabled = false until the repo HOST is chosen (GitHub Pages / S3 / own
# server — see INSTALLERS.md open items). The publish scripts are shared,
# host-gated scaffolds: they build + GPG-sign repo metadata locally and
# upload only when the *_REPO_URL/target is configured. GPG signing is
# env-gated via GPG_SIGNING_KEY (unsigned + warning when unset).
[stores.apt_repo]
enabled = false
cwd = "."
required_env = ["GPG_SIGNING_KEY", "APT_REPO_TARGET"]
commands = [
  "bash \"$CBUILD_TOOL_ROOT/scripts/publish-apt-repo.sh\" packaging/linux/dist/*.deb",
]

[stores.yum_repo]
enabled = false
cwd = "."
required_env = ["GPG_SIGNING_KEY", "YUM_REPO_TARGET"]
commands = [
  "bash \"$CBUILD_TOOL_ROOT/scripts/publish-yum-repo.sh\" packaging/linux/dist/*.rpm",
]

[stores.flatpak_repo]
enabled = false
cwd = "."
required_env = ["GPG_SIGNING_KEY", "FLATPAK_REPO_TARGET"]
commands = [
  "bash \"$CBUILD_TOOL_ROOT/scripts/publish-flatpak-repo.sh\" packaging/linux/dist/*.flatpak",
]
