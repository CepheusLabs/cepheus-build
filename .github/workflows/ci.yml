name: CI

# Manual-only: GitHub runner minutes are scarce, so this never auto-fires on
# push/PR. Run it on demand from the Actions tab or:
#   gh workflow run CI --ref main
# To re-enable automatic runs later, add `pull_request:` / `push:` triggers.
on:
  workflow_dispatch:

# A newer manual dispatch supersedes an in-flight one for the same ref, so we
# never burn scarce runner minutes on stale runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt into the Node 24 actions runtime now (GitHub forces it June 2026). We
# don't use Node ourselves — this only affects the JS-based actions below.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Compile check
        run: python -m py_compile cepheus_build/*.py cepheus_build/deploy/*.py

      - name: Type check (non-blocking)
        run: mypy cepheus_build || true

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest -q
          fi

  provisioning:
    name: Provisioning static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Syntax gate: a broken provisioner only fails at VM build time (slow,
      # remote). `bash -n` catches it here in seconds.
      - name: Bash syntax check
        run: |
          bash -n docker/macos/provision.sh \
                  docker/linux-builder/entrypoint.sh \
                  docker/runner/entrypoint.sh

      # shellcheck at warning level: the provisioner scripts are clean at this
      # severity today, so fail on warning to keep them that way. Drop to
      # -S error only if a future intentional pattern proves too noisy.
      - name: ShellCheck (warning-level)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck -S warning \
            docker/macos/provision.sh \
            docker/linux-builder/entrypoint.sh \
            docker/runner/entrypoint.sh

      # yamllint the compose files (relaxed: long lines/comments are fine; we
      # mainly want structural validity + no tabs/duplicate keys).
      - name: yamllint compose files
        run: |
          pip install yamllint
          yamllint -d relaxed docker/compose.yml docker/runner/compose.yml

      # The pin-lint pytest (tests/test_provisioning_pins.py) also runs in the
      # `python` job above; it is the automated guard against toolchain drift.

  flutter:
    name: Flutter analyze & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # The app depends on the private `shared/forge` submodule. A fork PR or a
      # run without org credentials can't clone it; in that case skip the
      # Flutter steps cleanly rather than fail red. Provide FORGE_DEPLOY_KEY
      # (or grant the default token access to CepheusLabs/forge) to enable.
      - name: Fetch forge submodule
        id: forge
        env:
          FORGE_DEPLOY_KEY: ${{ secrets.FORGE_DEPLOY_KEY }}
          GIT_TOKEN: ${{ secrets.FORGE_TOKEN }}
        run: |
          set -uo pipefail
          if [ -n "${FORGE_DEPLOY_KEY:-}" ]; then
            mkdir -p ~/.ssh
            echo "$FORGE_DEPLOY_KEY" > ~/.ssh/forge_key
            chmod 600 ~/.ssh/forge_key
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/forge_key -o StrictHostKeyChecking=no"
          fi
          if git submodule update --init --recursive; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::shared/forge submodule unavailable (private repo, no credentials); skipping Flutter analyze/test."
          fi

      - name: Set up Flutter
        if: steps.forge.outputs.ok == 'true'
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        if: steps.forge.outputs.ok == 'true'
        working-directory: app
        run: flutter pub get

      - name: Flutter analyze
        if: steps.forge.outputs.ok == 'true'
        working-directory: app
        run: flutter analyze

      - name: Flutter test
        if: steps.forge.outputs.ok == 'true'
        working-directory: app
        run: flutter test
