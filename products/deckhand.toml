[product]
slug = "deckhand"
display_name = "Deckhand"
# NB: the repo directory is "deckhand-app", not "deckhand" — slug and repo name
# intentionally differ here. Do not "correct" this to ../../deckhand.
repo_root = "../../deckhand-app"
app_dir = "app"

[version]
env_prefix = "DECKHAND"

[github]
repository = "CepheusLabs/deckhand-app"

[groups]
quality = ["fmt", "lint", "test"]
desktop = ["macos", "windows", "linux"]
desktop_packages = ["macos-dmg", "windows-installer", "linux-appimage", "linux-deb", "linux-rpm", "linux-flatpak"]
all = ["macos", "windows", "linux"]

[targets.fmt]
hosts = ["linux", "macos", "windows"]
cwd = "."
commands = { default = ["bash scripts/quality.sh fmt"], windows = ["pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/quality.ps1 fmt"] }
tools = { default = ["bash", "dart", "flutter"], windows = ["pwsh", "dart", "flutter"] }

[targets.lint]
hosts = ["linux", "macos", "windows"]
cwd = "."
commands = { default = ["bash scripts/quality.sh lint"], windows = ["pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/quality.ps1 lint"] }
tools = { default = ["bash", "dart", "flutter", "go"], windows = ["pwsh", "dart", "flutter", "go"] }

[targets.test]
hosts = ["linux", "macos", "windows"]
cwd = "."
commands = { default = ["bash scripts/quality.sh test"], windows = ["pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/quality.ps1 test"] }
tools = { default = ["bash", "dart", "flutter", "git", "go", "python3"], windows = ["pwsh", "dart", "flutter", "git", "go", "python"] }

[targets.macos]
hosts = ["macos"]
cwd = "."
commands = [
  "bash scripts/build.sh macos --release",
]
artifacts = ["app/build/macos/Build/Products/Release/deckhand.app"]
tools = ["bash", "go", "flutter", "xcodebuild", "pod"]

[targets.macos-dmg]
hosts = ["macos"]
cwd = "."
commands = [
  "bash scripts/build.sh macos --release",
  "bash packaging/macos/build_dmg.sh \"$CBUILD_VERSION\"",
]
artifacts = ["packaging/macos/dist/*.dmg"]
tools = ["bash", "go", "flutter", "xcodebuild", "pod", "codesign"]

[targets.windows]
hosts = ["windows"]
cwd = "."
commands = [
  "bash scripts/build.sh windows --release",
]
artifacts = ["app/build/windows/x64/runner/Release"]
tools = ["bash", "go", "flutter", "windres"]

[targets.windows-installer]
hosts = ["windows"]
cwd = "."
commands = [
  "bash scripts/build.sh windows --release",
  "iscc /dVersion=\"$CBUILD_VERSION\" packaging\\windows\\deckhand.iss",
]
artifacts = ["packaging/windows/dist/*"]
tools = ["bash", "go", "flutter", "windres", "iscc"]

[targets.linux]
hosts = ["linux"]
cwd = "."
commands = [
  "bash scripts/build.sh linux --release",
]
artifacts = ["app/build/linux/x64/release/bundle"]
tools = ["bash", "go", "flutter"]

[targets.linux-appimage]
hosts = ["linux"]
cwd = "."
commands = [
  "bash scripts/build.sh linux --release",
  "bash packaging/linux/build_appimage.sh \"$CBUILD_VERSION\"",
]
artifacts = ["packaging/linux/dist/*.AppImage"]
tools = ["bash", "go", "flutter", "appimagetool"]

[targets.linux-deb]
hosts = ["linux"]
cwd = "."
commands = [
  "bash scripts/build.sh linux --release",
  "bash packaging/linux/build_deb.sh \"$CBUILD_VERSION\"",
]
artifacts = ["packaging/linux/dist/*.deb"]
tools = ["bash", "go", "flutter", "dpkg-deb"]

[targets.linux-rpm]
hosts = ["linux"]
cwd = "."
commands = [
  "bash scripts/build.sh linux --release",
  "bash packaging/linux/build_rpm.sh \"$CBUILD_VERSION\"",
]
artifacts = ["packaging/linux/dist/*.rpm"]
tools = ["bash", "go", "flutter", "rpmbuild"]

[targets.linux-flatpak]
hosts = ["linux"]
cwd = "."
commands = [
  "bash scripts/build.sh linux --release",
  "bash packaging/linux/build_flatpak.sh \"$CBUILD_VERSION\"",
]
artifacts = ["packaging/linux/dist/*.flatpak"]
tools = ["bash", "go", "flutter", "flatpak", "flatpak-builder"]

[targets.ios]
enabled = false

[targets.android]
enabled = false

[targets.web]
enabled = false

[stores.github_release]
enabled = true
cwd = "."
required_env = ["GITHUB_TOKEN"]
# Globs quoted for upload-release.sh (nullglob + files-only): skips absent
# cross-host artifacts and filters out staging subdirs / stale dirs under the
# dist folders (a bare * would hand gh a directory and fail). Covers the new
# .deb/.rpm/.flatpak alongside the existing .AppImage.
commands = [
  "bash \"$CBUILD_TOOL_ROOT/scripts/upload-release.sh\" \"v$CBUILD_VERSION-$CBUILD_BUILD_NUMBER\" \"packaging/macos/dist/*.dmg\" \"packaging/windows/dist/*.exe\" \"packaging/linux/dist/*.AppImage\" \"packaging/linux/dist/*.deb\" \"packaging/linux/dist/*.rpm\" \"packaging/linux/dist/*.flatpak\"",
]

# ── Self-hosted package repositories (apt / yum / flatpak) ──────────────────
# enabled = false until the repo HOST is chosen (see INSTALLERS.md). Shared,
# host-gated publish scaffolds; GPG signing env-gated via GPG_SIGNING_KEY.
[stores.apt_repo]
enabled = false
cwd = "."
required_env = ["GPG_SIGNING_KEY", "APT_REPO_TARGET"]
commands = [
  "bash \"$CBUILD_TOOL_ROOT/scripts/publish-apt-repo.sh\" packaging/linux/dist/*.deb",
]

[stores.yum_repo]
enabled = false
cwd = "."
required_env = ["GPG_SIGNING_KEY", "YUM_REPO_TARGET"]
commands = [
  "bash \"$CBUILD_TOOL_ROOT/scripts/publish-yum-repo.sh\" packaging/linux/dist/*.rpm",
]

[stores.flatpak_repo]
enabled = false
cwd = "."
required_env = ["GPG_SIGNING_KEY", "FLATPAK_REPO_TARGET"]
commands = [
  "bash \"$CBUILD_TOOL_ROOT/scripts/publish-flatpak-repo.sh\" packaging/linux/dist/*.flatpak",
]

# ── Desktop auto-update feed (pd-updates control plane + R2 CDN) ─────────────
# enabled = false until the pd-updates backend + R2 bucket exist. Per artifact:
# sha256 + EdDSA-sign → upload to R2 → POST /v1/admin/releases with a
# printdeck.release-record/1 body. required_env is env-gated inside
# publish-update-feed.sh (warn + exit 0 when unset). Deckhand also covers the
# AppImage lane (linux-appimage self-updates; signature_target=file_bytes — the
# client reassembles via zsync and verifies the same raw bytes).
# NOTE: Deckhand's future MDM/OsContract silent-update hook (managed/printer
# context) is out of v1 scope — it is a later cl_updater config flag, not a lane.
[stores.update_publish]
enabled = false
cwd = "."
required_env = ["CL_UPDATE_ED25519_PRIVATE_KEY", "CL_UPDATE_PUBLISH_TOKEN", "R2_ACCOUNT_ID", "R2_ACCESS_KEY_ID", "R2_SECRET_ACCESS_KEY", "R2_BUCKET"]
commands = [
  "bash \"$CBUILD_TOOL_ROOT/scripts/publish-update-feed.sh\" --product deckhand --channel \"${CBUILD_CHANNEL:-stable}\" --version \"$CBUILD_VERSION\" --build \"$CBUILD_BUILD_NUMBER\" packaging/macos/dist/*.dmg packaging/windows/dist/*.exe packaging/linux/dist/*.AppImage",
]
