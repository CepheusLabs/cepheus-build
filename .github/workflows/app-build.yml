name: Shared App Build

on:
  workflow_call:
    inputs:
      product:
        description: Product config name in products/<product>.toml.
        required: true
        type: string
      toolkit-ref:
        description: cepheus-build ref to checkout.
        required: false
        default: main
        type: string
      mode:
        description: Flutter build mode.
        required: false
        default: release
        type: string
      targets:
        description: Space-separated targets or groups to build.
        required: false
        default: all
        type: string
      runner-profile:
        description: github-hosted or self-hosted. Ignored when matrix-json is set.
        required: false
        default: self-hosted
        type: string
      planner-runner-json:
        description: JSON runs-on value for the planning job. Use '["self-hosted","linux"]' for self-hosted-only orgs.
        required: false
        default: '["self-hosted","linux"]'
        type: string
      setup-flutter:
        description: Install Flutter with subosito/flutter-action before building.
        required: false
        default: true
        type: boolean
      setup-rust:
        description: Install Rust when a matrix row uses cargo/rustup.
        required: false
        default: true
        type: boolean
      rust-toolchain:
        description: Rust toolchain for dtolnay/rust-toolchain.
        required: false
        default: stable
        type: string
      setup-go:
        description: Install Go when a matrix row uses go.
        required: false
        default: true
        type: boolean
      go-version:
        description: Go version for actions/setup-go.
        required: false
        default: '1.22'
        type: string
      setup-buildroot-deps:
        description: Install Linux packages needed by Buildroot when a matrix row uses buildroot.
        required: false
        default: true
        type: boolean
      buildroot-dir:
        description: Optional Buildroot checkout path for products that build OS images.
        required: false
        default: ''
        type: string
      matrix-json:
        description: 'Optional full matrix JSON override. Shape: {"include":[{"name":"linux","runner":"ubuntu-latest","targets":"web linux"}]}.'
        required: false
        default: ''
        type: string

# Opt into the Node 24 actions runtime now (GitHub forces it June 2026). The
# toolkit itself uses no Node; this only affects the JS-based actions below.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  plan:
    name: Plan
    runs-on: ${{ fromJSON(inputs['planner-runner-json']) }}
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout product
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Checkout build toolkit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: CepheusLabs/cepheus-build
          ref: ${{ inputs['toolkit-ref'] }}
          path: .cepheus-build

      - name: Resolve matrix
        id: matrix
        shell: bash
        env:
          MATRIX_JSON: ${{ inputs['matrix-json'] }}
          PRODUCT: ${{ inputs.product }}
          RUNNER_PROFILE: ${{ inputs['runner-profile'] }}
          TARGETS: ${{ inputs.targets }}
        run: |
          set -euo pipefail
          PYTHON_BIN="$(command -v python3 || command -v python)"
          if [ -n "$MATRIX_JSON" ]; then
            matrix="$("$PYTHON_BIN" - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["MATRIX_JSON"])
          if isinstance(payload, list):
              payload = {"include": payload}
          print(json.dumps(payload, separators=(",", ":")))
          PY
          )"
          else
            matrix="$("$PYTHON_BIN" .cepheus-build/bin/cepheus-build ci-matrix \
              --product "$PRODUCT" \
              --repo-root "$GITHUB_WORKSPACE" \
              --runner-profile "$RUNNER_PROFILE" \
              $TARGETS)"
          fi
          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "$matrix"

  build:
    name: ${{ matrix.name }}
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout product
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Checkout build toolkit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: CepheusLabs/cepheus-build
          ref: ${{ inputs['toolkit-ref'] }}
          path: .cepheus-build

      - name: Set up Flutter
        if: ${{ inputs['setup-flutter'] && matrix.setup_flutter }}
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Set up Rust
        if: ${{ inputs['setup-rust'] && matrix.setup_rust }}
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ inputs['rust-toolchain'] }}

      - name: Install cargo-ndk
        if: ${{ inputs['setup-rust'] && matrix.setup_cargo_ndk }}
        shell: bash
        run: cargo install cargo-ndk --locked

      - name: Install wasm-pack
        if: ${{ inputs['setup-rust'] && matrix.setup_wasm_pack }}
        shell: bash
        run: cargo install wasm-pack --locked

      - name: Set up Go
        if: ${{ inputs['setup-go'] && matrix.setup_go }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs['go-version'] }}
          cache: false

      - name: Install Buildroot dependencies
        if: ${{ inputs['setup-buildroot-deps'] && matrix.setup_buildroot && matrix.host == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            build-essential \
            cpio \
            file \
            git \
            libncurses-dev \
            python3 \
            rsync \
            unzip \
            wget

      - name: Build
        shell: bash
        env:
          BUILDROOT_DIR: ${{ inputs['buildroot-dir'] }}
        run: |
          set -euo pipefail
          PYTHON_BIN="$(command -v python3 || command -v python)"
          "$PYTHON_BIN" .cepheus-build/bin/cepheus-build build \
            --product "${{ inputs.product }}" \
            --repo-root "$GITHUB_WORKSPACE" \
            --mode "${{ inputs.mode }}" \
            --skip-unsupported \
            ${{ matrix.targets }}

      - name: Collect artifact paths
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_BIN="$(command -v python3 || command -v python)"
          "$PYTHON_BIN" .cepheus-build/bin/cepheus-build artifacts \
            --product "${{ inputs.product }}" \
            --repo-root "$GITHUB_WORKSPACE" \
            --copy-to "$RUNNER_TEMP/cepheus-artifacts" \
            ${{ matrix.targets }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.product }}-${{ matrix.name }}
          path: ${{ runner.temp }}/cepheus-artifacts
          if-no-files-found: warn
