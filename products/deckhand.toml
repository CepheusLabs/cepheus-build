[product]
slug = "deckhand"
display_name = "Deckhand"
# NB: the repo directory is "deckhand-app", not "deckhand" — slug and repo name
# intentionally differ here. Do not "correct" this to ../../deckhand.
repo_root = "../../deckhand-app"
app_dir = "app"

[version]
env_prefix = "DECKHAND"

[github]
repository = "CepheusLabs/deckhand-app"

[groups]
desktop = ["macos", "windows", "linux"]
desktop_packages = ["macos-dmg", "windows-installer", "linux-appimage", "linux-deb", "linux-rpm", "linux-flatpak"]
all = ["macos", "windows", "linux"]

[targets.macos]
hosts = ["macos"]
cwd = "."
commands = [
  "bash scripts/build.sh macos --release",
]
artifacts = ["app/build/macos/Build/Products/Release/deckhand.app"]
tools = ["bash", "go", "flutter", "xcodebuild", "pod"]

[targets.macos-dmg]
hosts = ["macos"]
cwd = "."
commands = [
  "bash scripts/build.sh macos --release",
  "bash packaging/macos/build_dmg.sh \"$CBUILD_VERSION\"",
]
artifacts = ["packaging/macos/dist/*.dmg"]
tools = ["bash", "go", "flutter", "xcodebuild", "pod", "codesign"]

[targets.windows]
hosts = ["windows"]
cwd = "."
commands = [
  "bash scripts/build.sh windows --release",
]
artifacts = ["app/build/windows/x64/runner/Release"]
tools = ["bash", "go", "flutter", "windres"]

[targets.windows-installer]
hosts = ["windows"]
cwd = "."
commands = [
  "bash scripts/build.sh windows --release",
  "iscc /dVersion=\"$CBUILD_VERSION\" packaging\\windows\\deckhand.iss",
]
artifacts = ["packaging/windows/dist/*"]
tools = ["bash", "go", "flutter", "windres", "iscc"]

[targets.linux]
hosts = ["linux"]
cwd = "."
commands = [
  "bash scripts/build.sh linux --release",
]
artifacts = ["app/build/linux/x64/release/bundle"]
tools = ["bash", "go", "flutter"]

[targets.linux-appimage]
hosts = ["linux"]
cwd = "."
commands = [
  "bash scripts/build.sh linux --release",
  "bash packaging/linux/build_appimage.sh \"$CBUILD_VERSION\"",
]
artifacts = ["packaging/linux/dist/*.AppImage"]
tools = ["bash", "go", "flutter", "appimagetool"]

[targets.linux-deb]
hosts = ["linux"]
cwd = "."
commands = [
  "bash scripts/build.sh linux --release",
  "bash packaging/linux/build_deb.sh \"$CBUILD_VERSION\"",
]
artifacts = ["packaging/linux/dist/*.deb"]
tools = ["bash", "go", "flutter", "dpkg-deb"]

[targets.linux-rpm]
hosts = ["linux"]
cwd = "."
commands = [
  "bash scripts/build.sh linux --release",
  "bash packaging/linux/build_rpm.sh \"$CBUILD_VERSION\"",
]
artifacts = ["packaging/linux/dist/*.rpm"]
tools = ["bash", "go", "flutter", "rpmbuild"]

[targets.linux-flatpak]
hosts = ["linux"]
cwd = "."
commands = [
  "bash scripts/build.sh linux --release",
  "bash packaging/linux/build_flatpak.sh \"$CBUILD_VERSION\"",
]
artifacts = ["packaging/linux/dist/*.flatpak"]
tools = ["bash", "go", "flutter", "flatpak", "flatpak-builder"]

[targets.ios]
enabled = false

[targets.android]
enabled = false

[targets.web]
enabled = false

[stores.github_release]
enabled = true
cwd = "."
required_env = ["GITHUB_TOKEN"]
# packaging/linux/dist/* now also covers the new .deb/.rpm/.flatpak alongside
# the existing .AppImage.
commands = [
  "gh release upload \"v$CBUILD_VERSION-$CBUILD_BUILD_NUMBER\" packaging/windows/dist/* packaging/macos/dist/* packaging/linux/dist/* --clobber",
]

# ── Self-hosted package repositories (apt / yum / flatpak) ──────────────────
# enabled = false until the repo HOST is chosen (see INSTALLERS.md). Shared,
# host-gated publish scaffolds; GPG signing env-gated via GPG_SIGNING_KEY.
[stores.apt_repo]
enabled = false
cwd = "."
required_env = ["GPG_SIGNING_KEY", "APT_REPO_TARGET"]
commands = [
  "bash \"$CBUILD_TOOL_ROOT/scripts/publish-apt-repo.sh\" packaging/linux/dist/*.deb",
]

[stores.yum_repo]
enabled = false
cwd = "."
required_env = ["GPG_SIGNING_KEY", "YUM_REPO_TARGET"]
commands = [
  "bash \"$CBUILD_TOOL_ROOT/scripts/publish-yum-repo.sh\" packaging/linux/dist/*.rpm",
]

[stores.flatpak_repo]
enabled = false
cwd = "."
required_env = ["GPG_SIGNING_KEY", "FLATPAK_REPO_TARGET"]
commands = [
  "bash \"$CBUILD_TOOL_ROOT/scripts/publish-flatpak-repo.sh\" packaging/linux/dist/*.flatpak",
]
