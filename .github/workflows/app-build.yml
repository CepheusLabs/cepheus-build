name: Shared App Build

on:
  workflow_call:
    inputs:
      product:
        description: Product config name in products/<product>.toml.
        required: true
        type: string
      toolkit-ref:
        description: cepheus-build ref to checkout.
        required: false
        default: main
        type: string
      mode:
        description: Flutter build mode.
        required: false
        default: release
        type: string
      targets:
        description: Space-separated targets or groups to build.
        required: false
        default: all
        type: string
      # Tag-authoritative stamp overrides (release-pipeline locked decision L5):
      # app-release.yml parses the pushed tag and passes the parsed values here
      # so re-runs are reproducible. Empty (the default) keeps compute_stamp's
      # own date + rev-list stamping for plain CI builds.
      version:
        description: CBUILD_VERSION override (YY.M.D). Empty = compute_stamp.
        required: false
        default: ''
        type: string
      build-number:
        description: CBUILD_BUILD_NUMBER override. Empty = compute_stamp.
        required: false
        default: ''
        type: string
      channel:
        description: Release channel exported as CBUILD_CHANNEL (stable, beta, nightly). Empty = unset.
        required: false
        default: ''
        type: string
      runner-profile:
        description: github-hosted or self-hosted. Ignored when matrix-json is set.
        required: false
        default: self-hosted
        type: string
      planner-runner-json:
        description: JSON runs-on value for the planning job. Use '["self-hosted","linux"]' for self-hosted-only orgs.
        required: false
        default: '["self-hosted","linux"]'
        type: string
      setup-flutter:
        description: Install Flutter with subosito/flutter-action before building.
        required: false
        default: true
        type: boolean
      flutter-version:
        description: Flutter SDK version for subosito/flutter-action.
        required: false
        default: '3.41.7'
        type: string
      setup-rust:
        description: Install Rust when a matrix row uses cargo/rustup.
        required: false
        default: true
        type: boolean
      rust-toolchain:
        description: Rust toolchain for dtolnay/rust-toolchain.
        required: false
        default: '1.95.0'
        type: string
      setup-go:
        description: Install Go when a matrix row uses go.
        required: false
        default: true
        type: boolean
      go-version:
        description: Go version for actions/setup-go.
        required: false
        default: '1.26.4'
        type: string
      setup-buildroot-deps:
        description: Install Linux packages needed by Buildroot when a matrix row uses buildroot.
        required: false
        default: true
        type: boolean
      setup-packaging:
        description: Install native-installer toolchains (Inno Setup / dpkg / rpm / flatpak) when a matrix row builds those formats.
        required: false
        default: true
        type: boolean
      buildroot-dir:
        description: Optional Buildroot checkout path for products that build OS images.
        required: false
        default: ''
        type: string
      matrix-json:
        description: 'Optional full matrix JSON override. Shape: {"include":[{"name":"linux","runner":"ubuntu-latest","targets":"web linux"}]}.'
        required: false
        default: ''
        type: string
      checkout-submodules:
        description: Product checkout submodule policy for actions/checkout (false, true, or recursive).
        required: false
        default: recursive
        type: string
    # Code-signing credentials. ALL optional: when a secret is unset the
    # packaging scripts fall back to an unsigned artifact + warning (see
    # scripts/sign-windows.ps1 and scripts/sign-linux-gpg.sh). The caller passes
    # these via `secrets: inherit`; nothing here is ever echoed to logs.
    secrets:
      # Windows — Azure Trusted Signing.
      AZURE_TENANT_ID:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      TRUSTED_SIGNING_ENDPOINT:
        required: false
      TRUSTED_SIGNING_ACCOUNT:
        required: false
      TRUSTED_SIGNING_CERT_PROFILE:
        required: false
      # macOS — Developer ID + notarytool.
      MACOS_SIGN_ID:
        required: false
      MACOS_NOTARIZE_APPLE_ID:
        required: false
      MACOS_NOTARIZE_PASSWORD:
        required: false
      MACOS_NOTARIZE_TEAM_ID:
        required: false
      # Linux — GPG signing for packages + repo metadata.
      GPG_SIGNING_KEY:
        required: false
      GPG_SIGNING_KEY_ID:
        required: false
      GPG_SIGNING_KEY_PASSPHRASE:
        required: false
      # Optional org-scoped read token for private first-party package refs.
      # Falls back to github.token, which is enough only when org policy grants
      # this workflow access to the sibling private repos it fetches.
      CEPHEUS_READ_TOKEN:
        required: false
      # Desktop auto-update — EdDSA signing key + R2/control-plane publish creds.
      # ALL optional: when unset, sign-update-eddsa.sh leaves artifacts unsigned
      # and publish-update-feed.sh skips upload/registration (warn + exit 0), so
      # builds work before the update backend + bucket exist. GitHub masks these
      # automatically; nothing here is ever echoed. CL_UPDATE_ED25519_PRIVATE_KEY
      # is the base64 32-byte Ed25519 seed (from scripts/cl-update-keygen.sh).
      CL_UPDATE_ED25519_PRIVATE_KEY:
        required: false
      CL_UPDATE_PUBLISH_TOKEN:
        required: false
      R2_ACCOUNT_ID:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      R2_BUCKET:
        required: false
      # Android — Play upload keystore materialized into android/key.properties
      # only for Android matrix rows. All four must be present when any one is.
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false

# Opt into the Node 24 actions runtime now (GitHub forces it June 2026). The
# toolkit itself uses no Node; this only affects the JS-based actions below.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  plan:
    name: Plan
    runs-on: ${{ fromJSON(inputs['planner-runner-json']) }}
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout product
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          submodules: ${{ inputs['checkout-submodules'] }}

      - name: Checkout build toolkit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: CepheusLabs/cepheus-build
          ref: ${{ inputs['toolkit-ref'] }}
          path: .cepheus-build

      - name: Resolve matrix
        id: matrix
        shell: bash
        env:
          MATRIX_JSON: ${{ inputs['matrix-json'] }}
          PRODUCT: ${{ inputs.product }}
          RUNNER_PROFILE: ${{ inputs['runner-profile'] }}
          TARGETS: ${{ inputs.targets }}
        run: |
          set -euo pipefail
          PYTHON_BIN="$(command -v python3 || command -v python)"
          if [ -n "$MATRIX_JSON" ]; then
            matrix="$("$PYTHON_BIN" - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["MATRIX_JSON"])
          if isinstance(payload, list):
              payload = {"include": payload}
          print(json.dumps(payload, separators=(",", ":")))
          PY
          )"
          else
            matrix="$("$PYTHON_BIN" .cepheus-build/bin/cepheus-build ci-matrix \
              --product "$PRODUCT" \
              --repo-root "$GITHUB_WORKSPACE" \
              --runner-profile "$RUNNER_PROFILE" \
              $TARGETS)"
          fi
          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "$matrix"

  build:
    name: ${{ matrix.name }}
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout product
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          submodules: ${{ inputs['checkout-submodules'] }}

      - name: Checkout build toolkit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: CepheusLabs/cepheus-build
          ref: ${{ inputs['toolkit-ref'] }}
          path: .cepheus-build

      - name: Configure first-party package fetches
        shell: bash
        env:
          CEPHEUS_READ_TOKEN: ${{ secrets.CEPHEUS_READ_TOKEN || github.token }}
        run: |
          set -euo pipefail
          if [ -n "${CEPHEUS_READ_TOKEN:-}" ]; then
            git config --global url."https://x-access-token:${CEPHEUS_READ_TOKEN}@github.com/".insteadOf "https://github.com/"
            git config --global url."https://x-access-token:${CEPHEUS_READ_TOKEN}@github.com/".insteadOf "git@github.com:"
            cat > "$RUNNER_TEMP/git-askpass.sh" <<'SH'
          #!/usr/bin/env sh
          case "$1" in
            *Username*) printf '%s\n' "${GIT_USERNAME:-x-access-token}" ;;
            *Password*) printf '%s\n' "$GIT_PASSWORD" ;;
          esac
          SH
            chmod 700 "$RUNNER_TEMP/git-askpass.sh"
            {
              echo "GIT_CONFIG_COUNT=2"
              echo "GIT_CONFIG_KEY_0=url.https://x-access-token:${CEPHEUS_READ_TOKEN}@github.com/.insteadOf"
              echo "GIT_CONFIG_VALUE_0=https://github.com/"
              echo "GIT_CONFIG_KEY_1=url.https://x-access-token:${CEPHEUS_READ_TOKEN}@github.com/.insteadOf"
              echo "GIT_CONFIG_VALUE_1=git@github.com:"
              echo "GIT_ASKPASS=$RUNNER_TEMP/git-askpass.sh"
              echo "GIT_TERMINAL_PROMPT=0"
              echo "GIT_USERNAME=x-access-token"
              echo "GIT_PASSWORD=$CEPHEUS_READ_TOKEN"
            } >> "$GITHUB_ENV"
          fi
          if command -v go >/dev/null 2>&1; then
            go env -w GOPRIVATE=github.com/cepheuslabs/*,github.com/CepheusLabs/*
          fi

      - name: Set up Flutter
        if: ${{ inputs['setup-flutter'] && matrix.setup_flutter }}
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: ${{ inputs['flutter-version'] }}
          cache: true

      - name: Configure writable Rustup home
        if: ${{ inputs['setup-rust'] && (matrix.setup_rust || matrix.setup_cargo_ndk || matrix.setup_wasm_pack) }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.rustup"
          echo "RUSTUP_HOME=$HOME/.rustup" >> "$GITHUB_ENV"

      - name: Set up Rust
        if: ${{ inputs['setup-rust'] && matrix.setup_rust }}
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ inputs['rust-toolchain'] }}

      - name: Install cargo-ndk
        if: ${{ inputs['setup-rust'] && matrix.setup_cargo_ndk }}
        shell: bash
        run: cargo install cargo-ndk --locked

      - name: Install wasm-pack
        if: ${{ inputs['setup-rust'] && matrix.setup_wasm_pack }}
        shell: bash
        run: cargo install wasm-pack --locked

      - name: Set up Go
        if: ${{ inputs['setup-go'] && matrix.setup_go }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ inputs['go-version'] }}
          cache: false

      - name: Install Buildroot dependencies
        if: ${{ inputs['setup-buildroot-deps'] && matrix.setup_buildroot && matrix.host == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            build-essential \
            cpio \
            file \
            git \
            libncurses-dev \
            python3 \
            rsync \
            unzip \
            wget

      - name: Install Inno Setup
        if: ${{ inputs['setup-packaging'] && matrix.setup_innosetup && matrix.host == 'windows' }}
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Install deb packaging tools
        if: ${{ inputs['setup-packaging'] && matrix.setup_deb && matrix.host == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Install rpm packaging tools
        if: ${{ inputs['setup-packaging'] && matrix.setup_rpm && matrix.host == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install flatpak packaging tools
        if: ${{ inputs['setup-packaging'] && matrix.setup_flatpak && matrix.host == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Materialize Android release keystore
        if: ${{ matrix.setup_flutter }}
        shell: bash
        env:
          PRODUCT: ${{ inputs.product }}
          MATRIX_TARGETS: ${{ matrix.targets }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          case " ${MATRIX_TARGETS:-} " in
            *" android "*) ;;
            *)
              echo "android signing: matrix row has no android target; skipping."
              exit 0
              ;;
          esac

          configured=0
          missing=()
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -n "${!name:-}" ]; then
              configured=1
            else
              missing+=("$name")
            fi
          done
          if [ "$configured" -eq 0 ]; then
            echo "android signing: secrets are unset; leaving product fallback behavior in place."
            exit 0
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Android signing is partially configured; missing: %s\n' "${missing[*]}"
            exit 1
          fi

          PYTHON_BIN="$(command -v python3 || command -v python)"
          app_dir="$("$PYTHON_BIN" -c 'from pathlib import Path; import os, tomllib; product = os.environ["PRODUCT"]; data = tomllib.loads((Path(".cepheus-build/products") / f"{product}.toml").read_text()); print(data.get("product", {}).get("app_dir", "."))')"
          android_dir="$GITHUB_WORKSPACE/$app_dir/android"
          if [ ! -d "$android_dir" ]; then
            echo "::warning::android signing: $android_dir does not exist; skipping."
            exit 0
          fi

          keystore_file="$android_dir/upload-keystore.jks"
          key_properties_file="$android_dir/key.properties"
          KEYSTORE_FILE="$keystore_file" "$PYTHON_BIN" -c 'import base64, os; from pathlib import Path; payload = "".join(os.environ["ANDROID_KEYSTORE_BASE64"].split()); Path(os.environ["KEYSTORE_FILE"]).write_bytes(base64.b64decode(payload, validate=True))'
          {
            printf 'storeFile=upload-keystore.jks\n'
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
          } > "$key_properties_file"
          chmod 600 "$keystore_file" "$key_properties_file" || true
          echo "android signing: wrote android/key.properties for $PRODUCT."

      - name: Build
        shell: bash
        env:
          BUILDROOT_DIR: ${{ inputs['buildroot-dir'] }}
          # Tag-authoritative stamp overrides (empty values are ignored by
          # compute_stamp, so plain CI builds keep date+rev-list stamping).
          CBUILD_VERSION: ${{ inputs.version }}
          CBUILD_BUILD_NUMBER: ${{ inputs['build-number'] }}
          CBUILD_CHANNEL: ${{ inputs.channel }}
          # Code-signing passthrough. Every var is optional — when a secret is
          # unset the packaging scripts emit an unsigned artifact + warning, so
          # builds work before signing is configured. Never echoed to logs.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TRUSTED_SIGNING_ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          TRUSTED_SIGNING_ACCOUNT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          TRUSTED_SIGNING_CERT_PROFILE: ${{ secrets.TRUSTED_SIGNING_CERT_PROFILE }}
          MACOS_SIGN_ID: ${{ secrets.MACOS_SIGN_ID }}
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_PASSWORD: ${{ secrets.MACOS_NOTARIZE_PASSWORD }}
          MACOS_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_KEY_ID: ${{ secrets.GPG_SIGNING_KEY_ID }}
          GPG_SIGNING_KEY_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSPHRASE }}
          # Desktop auto-update: EdDSA seed + R2/control-plane publish creds.
          # Optional, masked, never echoed — unset means unsigned + no publish.
          CL_UPDATE_ED25519_PRIVATE_KEY: ${{ secrets.CL_UPDATE_ED25519_PRIVATE_KEY }}
          CL_UPDATE_PUBLISH_TOKEN: ${{ secrets.CL_UPDATE_PUBLISH_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          PYTHON_BIN="$(command -v python3 || command -v python)"
          "$PYTHON_BIN" .cepheus-build/bin/cepheus-build build \
            --product "${{ inputs.product }}" \
            --repo-root "$GITHUB_WORKSPACE" \
            --mode "${{ inputs.mode }}" \
            --skip-unsupported \
            ${{ matrix.targets }}

      - name: Collect artifact paths
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_BIN="$(command -v python3 || command -v python)"
          "$PYTHON_BIN" .cepheus-build/bin/cepheus-build artifacts \
            --product "${{ inputs.product }}" \
            --repo-root "$GITHUB_WORKSPACE" \
            --copy-to "$RUNNER_TEMP/cepheus-artifacts" \
            ${{ matrix.targets }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.product }}-${{ matrix.name }}
          path: ${{ runner.temp }}/cepheus-artifacts
          if-no-files-found: warn
